<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pantanal Explorer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet" href="css/explorer.css">

</head>

<body>

<header>

<div class="logo">
🧭 Pantanal Explorer
</div>

<input
type="text"
placeholder="Buscar pousada, animal ou km..."
>

</header>

<div id="map"></div>

<div id="info-panel" class="hidden">

    <button id="close-panel">✕</button>

    <div id="panel-content">

        <h2>Pantanal Explorer</h2>

        <p>Selecione um ponto no mapa.</p>

    </div>

</div>

<nav class="bottom-menu">

<button data-tipo="todos">🌎</button>

<button data-tipo="hotel">🏨</button>

<button data-tipo="cidade">🏙️</button>

<button data-tipo="destino">📍</button>

</nav>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="js/data.js"></script>
<script src="js/explorer.js"></script>

<button id="roteiro-btn">
    📋 Meu Roteiro
    <span id="roteiro-count">0</span>
</button>
</body>

</html>
</html>
