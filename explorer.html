<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pantanal Explorer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<link rel="stylesheet" href="css/explorer.css">

</head>

<body>

<header class="topbar">

<div class="logo">
🐆 Pantanal Explorer
</div>

</header>

<div id="map"></div>

<!-- Painel da pousada -->

<div id="info-panel">

<button id="close-panel">✕</button>

<div id="panel-content">

<h2>Pantanal Explorer</h2>

<p>Selecione uma pousada para ver os detalhes.</p>

</div>

</div>

<!-- Painel do roteiro -->

<div id="roteiro-panel">

<button id="close-roteiro">✕</button>

<div id="roteiro-content">

<h2>📋 Meu Roteiro</h2>

<p>Nenhuma parada adicionada.</p>

</div>

</div>

<!-- Botão flutuante -->

<button id="roteiro-btn">

📋 Meu Roteiro

<span id="roteiro-count">0</span>

</button>

<nav class="bottom-menu">

<button data-tipo="todos">🌎</button>

<button data-tipo="hotel">🏨</button>

<button data-tipo="cidade">🏙️</button>

<button data-tipo="destino">🐆</button>

</nav>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="js/data/cidades.js"></script>

<script src="js/data/pousadas.js"></script>

<script src="js/data/destinos.js"></script>

<script src="js/data/pontes.js"></script>

<script src="js/explorer.js"></script>

<script src="js/explorer.js"></script>

</body>

</html>
